<section class="checkout-section"‚ě§
<div class="section-header"‚ě§
<h2 class="section-title"‚ě§ Checkout</h2‚ě§

</div‚ě§


<div class="checkout-layout"‚ě§


<!-- ===== CHECKOUT FORM ===== --‚ě§
<div class="checkout-form-box"‚ě§
<h3 class="form-title"‚ě§ Your Details</h3‚ě§


<!--
Form submits to place_order view. method="post" is required for Django forms.
{% csrf_token %} is required by Django for security!
--‚ě§
 
<form action="{% url 'place_order' %}" method="post" class="checkout-form" id="checkout-form"‚ě§
{% csrf_token %}


<!-- Full Name --‚ě§
<div class="form-group"‚ě§
<label for="name"‚ě§ Full Name *</label‚ě§
<input
type="text" id="name" name="name"
placeholder="e.g. Rahul Sharma" required
class="form-input"
‚ě§
</div‚ě§
<div class="form-group"‚ě§
<label for="email"‚ě§ Email Address</label‚ě§
<input
type="email" id="email" name="email"

‚ě§
 
</div‚ě§


<div class="form-group"‚ě§
<label for="address"‚ě§ Delivery Address *</label‚ě§
<textarea id="address" name="address"
placeholder="e.g. 123, MG Road, Koramangala" required
class="form-input" rows="3"
‚ě§</textarea‚ě§
</div‚ě§
<div class="form-group"‚ě§
<label for="city"‚ě§ City *</label‚ě§
<input
type="text" id="city" name="city"
placeholder="e.g. Bengaluru" required
class="form-input"
‚ě§
</div‚ě§
 
<!-- Payment Note (Simulated) --‚ě§
<div class="payment-note"‚ě§
 <strong‚ě§Payment:</strong‚ě§ This is a simulated checkout.
No real payment required!
</div‚ě§


<!-- Submit Button --‚ě§
<button type="submit" class="btn btn-place-order"‚ě§
 Place Order
</button‚ě§


</form‚ě§
</div‚ě§
<div class="checkout-summary"‚ě§
<h3 class="summary-title"‚ě§ Your Order</h3‚ě§


{% for item in cart_items %}
<div class="checkout-item"‚ě§
<span‚ě§{{ item.emoji }} {{ item.name }} √ó
{{ item.quantity }}</span‚ě§
<span‚ě§‚āĻ{{ item.total }}</span‚ě§
</div‚ě§
{% endfor %}


<div class="summary-divider"‚ě§</div‚ě§
 
<div class="summary-row"‚ě§
<span‚ě§Delivery:</span‚ě§

</div‚ě§


<div class="summary-row total-row"‚ě§

</div‚ě§


<!-- Back to Cart --‚ě§
<a href="{% url 'cart' %}" class="btn btn-outline"‚ě§‚Üź Edit Cart</a‚ě§
</div‚ě§


</div‚ě§
</section‚ě§


{% endblock %}


{% block extra_js %}
<script‚ě§
// Simple client-side form validation
 
document.getElementById('checkout-form').addEventListener('submit', function(e) {
const name = document.getElementById('name').value.trim(); const address = document.getElementById('address').value.trim(); const city = document.getElementById('city').value.trim();

if (!name || !address || !city) { e.preventDefault();
alert('‚ö† Please fill in all required fields!');
}
});
</script‚ě§
{% endblock %}
